services:
  - type: web
    name: nabh-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app
    plan: free # No disk needed — uses Supabase cloud PostgreSQL
    envVars:
      - key: DATABASE_URL
        sync: false # Set this to your Supabase PostgreSQL URI in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false # Set this to your Vercel frontend URL in the Render dashboard
