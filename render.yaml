services:
  - type: web
    name: nabh-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker main:app
    plan: free # No disk needed — uses Supabase cloud PostgreSQL
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
